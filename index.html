<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <title>Emelie Widegren</title>
  <meta name="author" content="Emelie Widegren">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    :root {
      --pink:  #bf7080;
      --bg:    #eeeae4;
      --text:  #121110;
      --muted: #7a7570;
      --faint: #c0bbb5;
      --dot:   rgba(120, 112, 104, 0.18);
      --mono:  'SF Mono', 'Cascadia Code', 'Consolas', 'Monaco', monospace;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      min-height: 100%;
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    }

    /* 4. Dot grid background */
    body {
      background-color: var(--bg);
      background-image: radial-gradient(circle, var(--dot) 1px, transparent 1px);
      background-size: 22px 22px;
    }

    /* 2. Pink vertical bar — left edge */
    body::before {
      content: '';
      position: fixed;
      left: 0;
      top: 0;
      bottom: 0;
      width: 2px;
      background: var(--pink);
      z-index: 10;
    }

    main {
      padding: clamp(32px, 5vw, 56px) clamp(36px, 6vw, 72px);
    }

    /* ── Name hero ── */
    h1 {
      font-size: clamp(3.5rem, 9vw, 9rem);
      font-weight: 800;
      line-height: 0.92;
      letter-spacing: -0.04em;
      margin-bottom: clamp(16px, 2vw, 24px);
      /* 5. Noise filter applied via SVG */
      filter: url(#grain);
    }

    h1 .first { color: var(--pink); display: block; }
    h1 .last  { color: var(--text); display: block; }

    /* 1. Monospace label */
    .label {
      font-family: var(--mono);
      font-size: 11px;
      font-weight: 400;
      color: var(--muted);
      letter-spacing: 0.08em;
      margin-bottom: clamp(32px, 5vw, 56px);
    }

    .label .sep { margin: 0 8px; color: var(--pink); }

    /* ── Rule ── */
    .rule {
      width: 100%;
      height: 1px;
      background: var(--faint);
      margin-bottom: clamp(24px, 3.5vw, 40px);
    }

    /* ── Bottom row ── */
    .bottom {
      display: flex;
      align-items: baseline;
      gap: 16px;
    }

    /* 3. Links as coordinates */
    nav {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    nav a {
      font-family: var(--mono);
      font-size: 12px;
      text-decoration: none;
      color: var(--muted);
      transition: color 0.15s;
    }

    nav a .index {
      color: var(--pink);
      margin-right: 10px;
    }

    nav a:hover { color: var(--text); }

    /* ── Hacker detail ── */
    .footer {
      position: fixed;
      bottom: 24px;
      right: 32px;
      font-family: var(--mono);
      font-size: 11px;
      color: var(--faint);
      letter-spacing: 0.06em;
      display: flex;
      align-items: center;
      gap: 5px;
      user-select: none;
    }

    .cursor {
      display: inline-block;
      width: 7px;
      height: 12px;
      background: var(--pink);
      opacity: 0.4;
      border-radius: 1px;
      vertical-align: middle;
      animation: blink 1.2s step-start infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 0.4; }
      50%       { opacity: 0; }
    }
  </style>
</head>

<body>

<!-- 5. Inline SVG noise filter -->
<svg style="position:absolute;width:0;height:0;overflow:hidden" aria-hidden="true">
  <defs>
    <filter id="grain" x="0%" y="0%" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.72" numOctaves="4" stitchTiles="stitch" result="noise"/>
      <feColorMatrix type="saturate" values="0" in="noise" result="grayNoise"/>
      <feBlend in="SourceGraphic" in2="grayNoise" mode="multiply" result="blended"/>
      <feComposite in="blended" in2="SourceGraphic" operator="in"/>
    </filter>
  </defs>
</svg>

<main>

  <h1>
    <span class="first">Emelie</span>
    <span class="last">Widegren</span>
  </h1>

  <p class="label">
    Security Engineer
    <span class="sep">·</span>
    Stockholm
  </p>

  <div class="rule"></div>

  <div class="bottom">
    <nav>
      <a href="https://github.com/widegren" target="_blank" rel="noopener">
        <span class="index">[01]</span>github.com/widegren
      </a>
      <a href="https://linkedin.com/in/emeliewidegren" target="_blank" rel="noopener">
        <span class="index">[02]</span>linkedin.com/in/emeliewidegren
      </a>
    </nav>
  </div>

</main>

<div class="footer">0x00 <span class="cursor"></span></div>

</body>
</html>
